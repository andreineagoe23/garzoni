services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: monevo-backend:latest
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      DJANGO_SETTINGS_MODULE: settings.settings
      REDIS_URL: "redis://redis:6379/0"
      CELERY_BROKER_URL: "redis://redis:6379/0"
    volumes:
      - backend_static:/app/staticfiles
      - backend_media:/app/media
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-monevo}
      POSTGRES_USER: ${POSTGRES_USER:-monevo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-monevo}
    volumes:
      - backend_db_data:/var/lib/postgresql/data
    # Ports are set per-environment (dev uses MySQL:3307, prod uses Postgres:5432)
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    ports:
      - "${REDIS_PORT:-6379}:6379"

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: monevo-backend:latest
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      REDIS_URL: "redis://redis:6379/0"
      CELERY_BROKER_URL: "redis://redis:6379/0"
    command: celery -A settings worker -l info
    depends_on:
      backend:
        condition: service_started
      redis:
        condition: service_started

  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: monevo-backend:latest
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      REDIS_URL: "redis://redis:6379/0"
      CELERY_BROKER_URL: "redis://redis:6379/0"
    command: celery -A settings beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    depends_on:
      backend:
        condition: service_started
      redis:
        condition: service_started

volumes:
  backend_db_data:
  backend_media:
  backend_static:
