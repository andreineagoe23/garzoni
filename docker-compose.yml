services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        BUILD_SRC: "."
    image: garzoni-backend:latest
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      DJANGO_SETTINGS_MODULE: settings.settings
      # After: docker compose cp scripts/cloudinary-upload-results.json backend:/app/cloudinary-upload-results.json
      # Rebuilt images also resolve this via migrate_cloudinary_images without --json-path.
      CLOUDINARY_UPLOAD_MAP_JSON: /app/cloudinary-upload-results.json
      # Lets Expo/iOS use EXPO_PUBLIC_BACKEND_URL=http://<your-LAN-ip>:8000 (any Host header).
      # Or set ALLOWED_HOSTS_CSV=localhost,127.0.0.1,* in backend/.env instead of the flags below.
      DJANGO_ALLOW_ALL_HOSTS: "1"
      DJANGO_ALLOW_LAN_HOSTS: "true"
      ENABLE_DJANGO_EXTENSIONS: "${ENABLE_DJANGO_EXTENSIONS:-false}"
      # Use Postgres in Docker so the DB persists in backend_db_data (avoids re-running all migrations on every rebuild)
      DATABASE_URL: "postgresql://${POSTGRES_USER:-monevo}:${POSTGRES_PASSWORD:-monevo}@db:5432/${POSTGRES_DB:-monevo}"
      REDIS_URL: "redis://redis:6379/0"
      CELERY_BROKER_URL: "redis://redis:6379/0"
    volumes:
      - backend_static:/app/staticfiles
      - backend_media:/app/media
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-monevo}
      POSTGRES_USER: ${POSTGRES_USER:-monevo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-monevo}
    volumes:
      - backend_db_data:/var/lib/postgresql/data
    # Ports are set per-environment (see docker-compose.prod.yml for exposed Postgres port)
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    ports:
      - "${REDIS_PORT:-6379}:6379"

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        BUILD_SRC: "."
    image: garzoni-backend:latest
    restart: unless-stopped
    profiles:
      - celery
    env_file:
      - ./backend/.env
    environment:
      REDIS_URL: "redis://redis:6379/0"
      CELERY_BROKER_URL: "redis://redis:6379/0"
      SKIP_MIGRATIONS: "1"
      SKIP_COLLECTSTATIC: "1"
    command: celery -A settings worker -l info
    depends_on:
      backend:
        condition: service_started
      redis:
        condition: service_started

  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        BUILD_SRC: "."
    image: garzoni-backend:latest
    restart: unless-stopped
    profiles:
      - celery
    env_file:
      - ./backend/.env
    environment:
      REDIS_URL: "redis://redis:6379/0"
      CELERY_BROKER_URL: "redis://redis:6379/0"
      SKIP_MIGRATIONS: "1"
      SKIP_COLLECTSTATIC: "1"
    command: celery -A settings beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    depends_on:
      backend:
        condition: service_started
      redis:
        condition: service_started

volumes:
  backend_db_data:
  backend_media:
  backend_static:
