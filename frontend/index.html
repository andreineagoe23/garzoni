    <!-- Suppress console noise as early as possible (before extensions and app bundle). -->
    <script>
      (function () {
        var p = [
          "TSS:",
          "CONTENT_SHELL",
          "Content Script Bridge",
          "Sending response back",
          "React DevTools",
          "Download the React DevTools",
          "SCHJK",
          "DFP",
          "Breach notification",
          "feature flag is enabled",
          "Unknown message type",
          "MSG_CHECK_DOMAIN_ALLOW_LIST",
          "injection-tss",
          "hosted page injected",
          "MBTSS",
          "excluded result",
          "Risky TLD",
          "aggressive protection",
          "MBTSS_NOTIFICATION",
          "Banner not shown",
          "beforeinstallprompt",
          "prompt() to show the banner",
          "Violation",
          "non-passive",
          "Forced reflow",
          "handler took",
          "ERR_BLOCKED_BY_CLIENT",
          "Caught create URL",
          "Caught history",
          "Checking if repeated",
          "Shell protection",
          "Search Hijacking",
          "rel=preload",
          "uses an unsupported",
          "webpackOk",
          "runtime.lastError",
          "message port closed",
          "heartbeat",
          "event-",
          "open-fx",
          "stream:",
        ];
        function suppress(args) {
          var arr =
            args && typeof args.length === "number"
              ? Array.prototype.slice.call(args)
              : args != null
                ? [args]
                : [];
          var s = arr
            .map(function (a) {
              return typeof a === "string" ? a : String(a);
            })
            .join(" ");
          return p.some(function (phrase) {
            return s.indexOf(phrase) !== -1;
          });
        }
        ["log", "info", "warn", "error", "debug"].forEach(function (m) {
          var orig = console[m];
          if (orig)
            console[m] = function () {
              if (!suppress(arguments)) orig.apply(console, arguments);
            };
        });
      })();
    </script>

    <script>
      (function () {
        var MEASUREMENT_ID = "G-99E61ZXSV9";
        function deniedUpdate() {
          if (typeof window.gtag !== "function") return;
          window.gtag("consent", "update", {
            analytics_storage: "denied",
            ad_storage: "denied",
            ad_user_data: "denied",
            ad_personalization: "denied",
          });
        }
        function loadGA() {
          if (window.__GARZONI_GA_LOADED__) return;
          window.__GARZONI_GA_LOADED__ = true;
          var gaScript = document.createElement("script");
          gaScript.async = true;
          gaScript.src =
            "https://www.googletagmanager.com/gtag/js?id=" + MEASUREMENT_ID;
          document.head.appendChild(gaScript);
          window.dataLayer = window.dataLayer || [];
          function gtag() {
            dataLayer.push(arguments);
          }
          gtag("js", new Date());
          gtag("consent", "update", {
            analytics_storage: "granted",
            ad_storage: "denied",
            ad_user_data: "denied",
            ad_personalization: "denied",
          });
          gtag("config", MEASUREMENT_ID, {
            anonymize_ip: true,
            allow_google_signals: false,
            debug_mode: false,
          });
        }
        function maybeLoadGA() {
          try {
            var raw = localStorage.getItem("garzoni_cookie_consent");
            if (raw) {
              var c = JSON.parse(raw);
              if (c && c.analytics) {
                loadGA();
                return true;
              }
            }
          } catch (e) {}
          return false;
        }
        maybeLoadGA();
        window.addEventListener("GarzoniCookieConsent", function (ev) {
          var detail = ev.detail;
          if (detail && detail.analytics) {
            loadGA();
          } else {
            deniedUpdate();
          }
        });
      })();
    </script>
