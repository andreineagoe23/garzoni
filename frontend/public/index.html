<!doctype html>

  <head>
    <!-- Suppress console noise as early as possible (before extensions and app bundle). -->
    <script>
      (function () {
        var p = ["TSS:","CONTENT_SHELL","Content Script Bridge","Sending response back","React DevTools","Download the React DevTools","SCHJK","DFP","Breach notification","feature flag is enabled","Unknown message type","MSG_CHECK_DOMAIN_ALLOW_LIST","injection-tss","hosted page injected","MBTSS","excluded result","Risky TLD","aggressive protection","MBTSS_NOTIFICATION","Banner not shown","beforeinstallprompt","prompt() to show the banner","Violation","non-passive","Forced reflow","handler took","ERR_BLOCKED_BY_CLIENT","Caught create URL","Caught history","Checking if repeated","Shell protection","Search Hijacking","rel=preload","uses an unsupported","webpackOk","runtime.lastError","message port closed","heartbeat","event-","open-fx","stream:"];
        function suppress(args) {
          var arr = args && typeof args.length === "number" ? Array.prototype.slice.call(args) : (args != null ? [args] : []);
          var s = arr.map(function(a) { return typeof a === "string" ? a : String(a); }).join(" ");
          return p.some(function(phrase) { return s.indexOf(phrase) !== -1; });
        }
        ["log","info","warn","error","debug"].forEach(function(m) {
          var orig = console[m];
          if (orig) console[m] = function() { if (!suppress(arguments)) orig.apply(console, arguments); };
        });
      })();
    </script>

    <!-- Conditionally Load Cookiebot/Usercentrics (frontend only) -->
    <script>
      if (window.location.hostname.includes("monevo.tech")) {
        const autoblocker = document.createElement("script");
        autoblocker.src =
          "https://web.cmp.usercentrics.eu/modules/autoblocker.js";
        autoblocker.async = true;
        document.head.appendChild(autoblocker);

        const ucScript = document.createElement("script");
        ucScript.id = "usercentrics-cmp";
        ucScript.src = "https://web.cmp.usercentrics.eu/ui/loader.js";
        ucScript.setAttribute("data-settings-id", "o3gY1UKzmzy6yw");
        ucScript.async = true;
        document.head.appendChild(ucScript);
      }
    </script>

    <!-- Google Consent Mode (Always runs) -->
    <script data-cookieconsent="ignore">
      window.dataLayer = window.dataLayer || [];
      function gtag() {
        dataLayer.push(arguments);
      }
      gtag("consent", "default", {
        ad_personalization: "denied",
        ad_storage: "denied",
        ad_user_data: "denied",
        analytics_storage: "denied",
        functionality_storage: "denied",
        personalization_storage: "denied",
        security_storage: "granted",
        wait_for_update: 500,
      });
      gtag("set", "ads_data_redaction", true);
      gtag("set", "url_passthrough", false);
    </script>

    <!-- Preconnect to Critical Origins -->

    <!-- Dynamic Google Analytics Loader (only if consented) -->
    <script data-cookieconsent="ignore">
      window.addEventListener("CookiebotOnAccept", function () {
        if (window.Cookiebot?.consent?.statistics) {
          const gaScript = document.createElement("script");
          gaScript.async = true;
          gaScript.src =
            "https://www.googletagmanager.com/gtag/js?id=G-0H3QCDXCE8";
          document.head.appendChild(gaScript);

          window.dataLayer = window.dataLayer || [];
          function gtag() {
            dataLayer.push(arguments);
          }
          gtag("js", new Date());
          gtag("config", "G-0H3QCDXCE8", {
            anonymize_ip: true,
            allow_google_signals: false,
            debug_mode: false,
          });
        }
      });
    </script>
