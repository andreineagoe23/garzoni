[flake8]
max-line-length = 100
# Black-compatible; E203/W503 are intentional style differences.
# E501: many long lines in legacy Django/management code (Black does not wrap all strings).
# F401/F841: widespread unused imports/locals in views re-exports and scripts — tighten over time.
# E741/F541: rare one-off issues in management commands.
extend-ignore = E203,W503,E501,F401,F841,E741,F541
exclude =
    */migrations/*
    */__pycache__/*
    .venv
    venv
