# Runs on every `git commit` after you run once:  pre-commit install
# (Requires: pip install pre-commit, and for Black: pip install black; for frontend hooks: node/npm in frontend/)

exclude: |
  (?x)^(
    frontend/node_modules/|
    frontend/build/|
    frontend/package-lock\.json|
    backend/staticfiles/|
    backend/media/|
    backend/db\.sqlite3
  )

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-merge-conflict
      - id: check-yaml
      - id: fix-byte-order-marker
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-added-large-files
        args: ["--maxkb=1024"]

  - repo: https://github.com/psf/black
    rev: 24.10.0
    hooks:
      - id: black
        # Use whatever Python is available locally (avoids Windows "python3.12" registry issues).
        language_version: python3
        files: ^backend/.*\.py$

  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ["--baseline", ".secrets.baseline"]

  # Frontend lint/format: run in CI only. Before push: cd frontend && npm run lint && npm run format
