name: CI

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

jobs:
  backend-python:
    name: Backend (Python)
    runs-on: ubuntu-latest
    env:
      DEBUG: "True"
      CELERY_TASK_ALWAYS_EAGER: "True"
      DJANGO_SETTINGS_MODULE: settings.settings
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/garzoni_test # pragma: allowlist secret
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres # pragma: allowlist secret
          POSTGRES_DB: garzoni_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements.txt
          python -m pip install "black==25.1.0" "flake8==7.1.1" pip-audit

      - name: Lint (black)
        run: |
          black --check backend

      - name: Lint (flake8)
        run: |
          flake8 backend

      - name: Migration drift check
        run: |
          cd backend
          python manage.py makemigrations --check --dry-run

      - name: Unit tests
        run: |
          cd backend && python manage.py test

      - name: Content sync + quality gates
        run: |
          cd backend
          python manage.py migrate --noinput
          python manage.py sync_content_release
          python manage.py verify_lesson_video_embeds --fix
          python manage.py validate_lesson_quality_gates

      - name: Security (pip-audit)
        run: |
          pip-audit -r backend/requirements.txt

  frontend-js:
    name: Frontend (JS)
    runs-on: ubuntu-latest
    env:
      CI: "true"
    steps:
      - uses: actions/checkout@v6

      # Version comes from root package.json "packageManager" (do not pin a different version here).
      - uses: pnpm/action-setup@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck (core + web + mobile)
        run: pnpm run typecheck

      - name: Lint (mobile / eslint via Expo)
        run: pnpm run lint:mobile

      - name: Lint (eslint)
        run: pnpm --filter @garzoni/web lint

      - name: Format check (prettier)
        run: pnpm --filter @garzoni/web format:check

      - name: Unit tests
        run: pnpm --filter @garzoni/web test

      - name: Build
        run: pnpm --filter @garzoni/web build

      - name: Security (pnpm audit)
        run: pnpm audit --audit-level=high
        continue-on-error: true

  docker-build-check:
    name: Docker Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Build backend image
        run: docker build --build-arg BUILD_SRC=backend -f backend/Dockerfile -t garzoni-backend:ci .

      - name: Build frontend image
        run: docker build -f frontend/Dockerfile -t garzoni-frontend:ci .
