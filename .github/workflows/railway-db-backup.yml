name: Railway DB Backup

on:
  schedule:
    - cron: "0 2 */3 * *"
  workflow_dispatch:

jobs:
  backup:
    name: Backup Railway Postgres
    runs-on: ubuntu-latest
    steps:
      - name: Check for DB URL
        id: check
        run: |
          if [ -z "${{ secrets.RAILWAY_DB_URL }}" ]; then
            echo "skipped=true" >> "$GITHUB_OUTPUT"
            echo "RAILWAY_DB_URL not set in repo secrets; backup skipped. Add it under Settings > Secrets to enable backups."
          else
            echo "skipped=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install pg_dump client
        if: steps.check.outputs.skipped != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Create backup
        if: steps.check.outputs.skipped != 'true'
        env:
          RAILWAY_DB_URL: ${{ secrets.RAILWAY_DB_URL }}
        run: |
          TS="$(date +%Y-%m-%d_%H%M%S)"
          OUT="railway_backup_${TS}.dump"
          pg_dump --format=custom "$RAILWAY_DB_URL" > "$OUT"
          echo "BACKUP_FILE=$OUT" >> "$GITHUB_ENV"

      - name: Upload backup artifact
        if: steps.check.outputs.skipped != 'true'
        uses: actions/upload-artifact@v7
        with:
          name: railway-db-backup
          path: ${{ env.BACKUP_FILE }}
          retention-days: 14
