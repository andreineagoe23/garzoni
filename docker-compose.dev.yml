services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        BUILD_SRC: "."
    image: garzoni-backend:dev
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      DJANGO_SETTINGS_MODULE: settings.settings
      DJANGO_ENV: "development"
      DEBUG: "True"
      # Same as root compose: mobile hits http://<LAN-IP>:8000. Override via ALLOWED_HOSTS_CSV in backend/.env if needed.
      DJANGO_ALLOW_ALL_HOSTS: "1"
      DJANGO_ALLOW_LAN_HOSTS: "true"
      CELERY_TASK_ALWAYS_EAGER: "True"
      # Use same POSTGRES_* as db service (set in project root .env or backend/.env)
      DATABASE_URL: "postgresql://${POSTGRES_USER:-monevo}:${POSTGRES_PASSWORD:-monevo}@db:5432/${POSTGRES_DB:-monevo}"
      REDIS_URL: "redis://redis:6379/0"
      CELERY_BROKER_URL: "redis://redis:6379/0"
      ALLOWED_HOSTS_CSV: "${ALLOWED_HOSTS_CSV:-localhost,127.0.0.1}"
      CORS_ALLOWED_ORIGINS_CSV: "${CORS_ALLOWED_ORIGINS_CSV:-http://localhost:3000,http://127.0.0.1:3000}"
      CSRF_TRUSTED_ORIGINS_CSV: "${CSRF_TRUSTED_ORIGINS_CSV:-http://localhost:3000,http://127.0.0.1:3000}"
      SEED_AFTER_MIGRATE: "1"
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
      - ./backend/media:/app/media
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-monevo}
      POSTGRES_USER: ${POSTGRES_USER:-monevo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-monevo}
    volumes:
      - backend_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"

volumes:
  backend_db_data:
