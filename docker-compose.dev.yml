services:
  backend:
    env_file:
      - ./backend/.env.dev
    environment:
      DJANGO_ENV: "development"
      DEBUG: "True"
      CELERY_TASK_ALWAYS_EAGER: "True"
      DATABASE_URL: "${DATABASE_URL:-sqlite:///db.sqlite3}"
      ALLOWED_HOSTS_CSV: "${ALLOWED_HOSTS_CSV:-localhost,127.0.0.1}"
      CORS_ALLOWED_ORIGINS_CSV: "${CORS_ALLOWED_ORIGINS_CSV:-http://localhost:3000,http://127.0.0.1:3000}"
      CSRF_TRUSTED_ORIGINS_CSV: "${CSRF_TRUSTED_ORIGINS_CSV:-http://localhost:3000,http://127.0.0.1:3000}"
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
      - ./backend/media:/app/media
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-monevo}
      MYSQL_USER: ${MYSQL_USER:-monevo}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-monevo}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-recover123}
    volumes:
      - backend_db_data:/var/lib/mysql
    ports:
      - "${MYSQL_PORT:-3307}:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$$MYSQL_ROOT_PASSWORD && mysql -uroot -p$$MYSQL_ROOT_PASSWORD -e 'SELECT 1' $$MYSQL_DATABASE || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s

  redis:
    profiles:
      - prod

  celery_worker:
    profiles:
      - prod

  celery_beat:
    profiles:
      - prod
